<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>板橋咖啡地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #map { height: 100vh; width: 100%; background: #e5e7eb; }
        /* 美化滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* 多選按鈕選中樣式 */
        .filter-btn.active {
            background-color: #0891b2;
            color: white;
            border-color: #0891b2;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="overflow-hidden bg-gray-100">

    <div id="map" class="h-screen w-screen bg-gray-200 flex items-center justify-center text-gray-400 text-center px-10">
        <div>
            <i class="fas fa-map-marked-alt text-4xl mb-4"></i><br>
            Google Map 預留區 (隊友串接處)
        </div>
    </div>

    <button id="open-filter-btn" onclick="toggleFilter()" class="fixed top-5 left-5 z-30 bg-white w-12 h-12 shadow-lg rounded-full flex items-center justify-center text-cyan-600 hover:bg-cyan-50 hidden transition-all">
        <i class="fas fa-filter"></i>
    </button>

    <div id="filter-panel" class="fixed top-5 left-5 w-80 bg-white shadow-2xl rounded-xl flex flex-col transition-all duration-300 z-40 max-h-[92vh]">
        <div class="p-4 border-b bg-white rounded-t-xl flex justify-between items-center">
            <h2 class="text-lg font-bold text-gray-800">板橋咖啡地圖</h2>
            <button onclick="toggleFilter()" class="text-gray-400 hover:text-gray-600 p-1">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>
        
        <div class="p-4 bg-white border-b">
            <div class="relative">
                <input type="text" placeholder="搜尋店名..." class="w-full bg-gray-100 border-none rounded-lg py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-cyan-500 transition">
                <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
            </div>
        </div>

        <div class="p-4 space-y-6 overflow-y-auto custom-scrollbar flex-grow">
            <section>
                <h3 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">環境現況</h3>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-plug mb-1"></i>插座多</button>
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-wifi mb-1"></i>收訊不錯</button>
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-volume-down mb-1"></i>安靜程度</button>
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-clock mb-1"></i>不限時</button>
                </div>
            </section>

            <section>
                <h3 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">餐點與消費</h3>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-utensils mb-1"></i>提供輕食</button>
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-leaf mb-1 text-green-500"></i>提供素食</button>
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-coins mb-1"></i>無低消</button>
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-mug-hot mb-1"></i>低消一杯飲</button>
                </div>
            </section>

            <section>
                <h3 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">特色服務</h3>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-language mb-1"></i>外文對應</button>
                    <button onclick="toggleActive(this)" class="filter-btn border rounded-lg py-2 flex flex-col items-center"><i class="fas fa-paw mb-1"></i>寵物友善</button>
                </div>
            </section>
        </div>

        <div class="p-4 border-t bg-gray-50 rounded-b-xl flex gap-2">
            <button onclick="resetFilters()" class="flex-1 text-gray-500 text-sm font-medium hover:underline">清除重置</button>
            <button class="flex-[2] bg-cyan-600 text-white py-2 rounded-lg font-bold hover:bg-cyan-700 shadow-md">確認篩選</button>
        </div>
    </div>

    <div class="fixed top-5 right-5 z-50">
        <button id="hamburger-btn" onclick="toggleMenu()" class="bg-white w-12 h-12 shadow-lg rounded-full flex items-center justify-center text-cyan-600 hover:bg-gray-50 transition-all">
            <i id="hamburger-icon" class="fas fa-bars text-xl"></i>
        </button>
    </div>
    <!-- 右側選單 -->
    <div id="side-menu" class="fixed top-0 right-0 h-full w-72 bg-white shadow-2xl translate-x-full transition-transform duration-300 z-40 flex flex-col">
        <div class="p-10 pt-20 flex flex-col gap-6 flex-grow text-gray-700">
            <a href="#" class="flex items-center gap-4 hover:text-cyan-600 transition font-medium"><i class="fas fa-home w-6"></i>回首頁</a>
            <a href="#" class="flex items-center gap-4 hover:text-cyan-600 transition font-medium"><i class="fas fa-award w-6"></i>精選咖啡廳</a>
            <a href="#" class="flex items-center gap-4 hover:text-cyan-600 transition font-medium"><i class="fas fa-heart w-6"></i>我的收藏</a>
            
            <hr class="my-4">
            
            <div id="login-btn-container">
                </div>

            <div id="admin-section" class="hidden mt-4 p-4 bg-orange-50 rounded-lg border border-orange-100">
                <p class="text-xs font-bold text-orange-600 mb-2 uppercase">管理員專區</p>
                <a href="#" class="text-sm text-gray-600 hover:text-orange-600 block mb-2 font-medium">後台審核系統</a>
            </div>
        </div>
        <div class="p-6 text-center text-gray-400 text-xs">
            © 2026 板橋咖啡地圖專案
        </div>
    </div>

    <script type="module">
        // 1. Firebase 初始化 (請替換成妳的 Config)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
        apiKey: "AIzaSyCrVoOqiW-k3rARwQQ_AA31jVrJhNhHZZg",
        authDomain: "sa-cafe.firebaseapp.com",
        projectId: "sa-cafe",
        storageBucket: "sa-cafe.firebasestorage.app",
        messagingSenderId: "315009789014",
        appId: "1:315009789014:web:b22db4d279b684a6f95ff7",
        measurementId: "G-GT6385G92X"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        // 將函式暴露給全域 (因為 type="module" 會限制作用域)
        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert("登入失敗: " + error.message);
            }
        };

        window.logout = () => signOut(auth);

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            const container = document.getElementById('login-btn-container');
            if (user) {
                container.innerHTML = `
                    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl mb-4">
                        <img src="${user.photoURL}" class="w-10 h-10 rounded-full">
                        <div>
                            <p class="text-sm font-bold">${user.displayName}</p>
                            <button onclick="logout()" class="text-xs text-red-500 hover:underline">登出帳戶</button>
                        </div>
                    </div>
                `;
                // 模擬權限檢查
                checkRole(user.email);
            } else {
                container.innerHTML = `
                    <button onclick="loginWithGoogle()" class="w-full bg-cyan-600 text-white py-3 rounded-xl font-bold hover:bg-cyan-700 transition flex items-center justify-center gap-2">
                        <i class="fab fa-google"></i> Google 快速登入
                    </button>
                `;
                document.getElementById('admin-section').classList.add('hidden');
            }
        });

        function checkRole(email) {
            // 資管系筆記：這部分之後要改從資料庫讀取
            if (email.includes('admin') || email === '妳自己的email@gmail.com') {
                document.getElementById('admin-section').classList.remove('hidden');
            }
        }
    </script>

    <script>
        // 2. UI 切換邏輯
        function toggleFilter() {
            const panel = document.getElementById('filter-panel');
            const openBtn = document.getElementById('open-filter-btn');
            panel.classList.toggle('-translate-x-[120%]');
            setTimeout(() => { openBtn.classList.toggle('hidden'); }, 200);
        }

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const icon = document.getElementById('hamburger-icon');
            menu.classList.toggle('translate-x-full');
            // 切換圖示：打叉或漢堡
            if (menu.classList.contains('translate-x-full')) {
                icon.className = 'fas fa-bars text-xl';
            } else {
                icon.className = 'fas fa-times text-xl';
            }
        }

        function toggleActive(btn) {
            btn.classList.toggle('active');
        }

        function resetFilters() {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Next.js 應用已建立</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f1ea;
            color: #333;
        }
        .notice {
            max-width: 560px;
            padding: 32px;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .notice h1 {
            margin-bottom: 16px;
            font-size: 1.5rem;
        }
        .notice p {
            margin: 0 0 12px;
            line-height: 1.6;
        }
        .notice code {
            display: block;
            margin: 12px auto;
            padding: 12px 16px;
            background: #f1f5f9;
            border-radius: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }
    </style>
</head>
<body>
    <div class="notice">
        <h1>已轉成 Next.js 專案</h1>
        <p>原本的 `homepage.html` 已改為 Next.js 應用，請切換到新入口頁面：</p>
        <code>pages/index.js</code>
        <p>如果要執行此應用，請在專案根目錄下運行：</p>
        <code>npm install</code>
        <code>npm run dev</code>
    </div>
</body>
</html>

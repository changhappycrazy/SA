<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>板橋咖啡地圖 - 徹底清空重連版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #map { height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 0; }
        #status-box { position: fixed; top: 10px; right: 10px; z-index: 100; background: black; color: #0f0; padding: 10px; font-family: monospace; border-radius: 5px; font-size: 12px; }
        .active-btn { background-color: #0891b2 !important; color: white !important; }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden">

    <div id="status-box">正在嘗試連線雲端...</div>
    <div id="map"></div>

    <div class="fixed top-5 left-5 w-80 bg-white shadow-2xl rounded-xl z-40 flex flex-col max-h-[90vh]">
        <div class="p-4 border-b font-bold text-lg text-cyan-800">板橋咖啡地圖 (88筆)</div>
        <div class="p-3 border-b">
            <input type="text" id="search-box" placeholder="搜尋店名或地址..." class="w-full bg-gray-100 p-2 rounded text-sm focus:outline-cyan-500">
        </div>
        <div class="p-4 overflow-y-auto space-y-4 text-xs text-gray-600">
            <div>
                <p class="font-bold mb-2">環境現況</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">插座多</button>
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">收訊不錯</button>
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">安靜程度</button>
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">不限時</button>
                </div>
            </div>
            <div>
                <p class="font-bold mb-2">餐點與消費</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">提供輕食</button>
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">提供素食</button>
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">無低消</button>
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">低消一杯飲</button>
                </div>
            </div>
            <div>
                <p class="font-bold mb-2">特色服務</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">外文對應</button>
                    <button onclick="this.classList.toggle('active-btn')" class="border p-2 rounded">寵物友善</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://xyqmabihbnmeuzptqqpb.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5cW1hYmloYm5tZXV6cHRxcXBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0Nzg2MzMsImV4cCI6MjA5MTA1NDYzM30.p5lTli-IXyY_LVU3PSR6DKwKyxmcFHkXy0-EGrXH48s'
        );

        let map, markers = [];

        async function init() {
            // 1. 地圖初始化 (中心設在板橋)
            map = L.map('map', { zoomControl: false }).setView([25.0119, 121.4637], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            document.getElementById('status-box').innerText = "連線中...";

            // 2. 抓取資料
            const { data, error } = await _supabase.from('cafes').select('*');

            if (error) {
                document.getElementById('status-box').innerText = "❌ 錯誤: " + error.message;
                return;
            }

            document.getElementById('status-box').innerText = `✅ 成功連線！抓到 ${data.length} 筆資料`;

            // 3. 畫點 (使用 CircleMarker，絕不破圖)
            data.forEach(c => {
                const marker = L.circleMarker([c.latitude, c.longitude], {
                    radius: 8, fillColor: "#0891b2", color: "#fff", weight: 2, fillOpacity: 0.8
                }).addTo(map).bindPopup(`<b>${c.name}</b><br>${c.address || ''}`);
                
                marker.cafeData = c;
                markers.push(marker);
            });

            // 4. 搜尋功能
            document.getElementById('search-box').addEventListener('input', function(e) {
                const key = e.target.value.toLowerCase().trim();
                markers.forEach(m => {
                    const match = m.cafeData.name.toLowerCase().includes(key) || m.cafeData.address.toLowerCase().includes(key);
                    if (match) { m.addTo(map); } else { map.removeLayer(m); }
                });
            });
        }

        init();
    </script>
</body>
</html>
